<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Student Management System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 16px 24px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .header h1 { font-size: 22px; color: #1a1a2e; }

    .btn-logout {
      padding: 8px 20px;
      background: #e04444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .card h2 { margin-bottom: 16px; color: #1a1a2e; font-size: 18px; }

    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }

    .form-row input {
      flex: 1;
      min-width: 150px;
      padding: 10px 14px;
      border: 2px solid #e8e8e8;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    .form-row input:focus { border-color: #667eea; }

    .btn-add {
      padding: 10px 24px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .search-bar {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
    }

    .search-bar:focus { border-color: #667eea; }

    .sort-select {
      padding: 10px 14px;
      border: 2px solid #e8e8e8;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }

    .student-card {
      background: #f8f9ff;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 12px;
      border-left: 4px solid #667eea;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .student-info strong { font-size: 16px; color: #1a1a2e; }
    .student-info p { font-size: 13px; color: #666; margin-top: 3px; }

    .student-actions { display: flex; gap: 8px; }

    .btn-edit {
      padding: 7px 16px;
      background: #f0a500;
      color: white;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .btn-delete {
      padding: 7px 16px;
      background: #e04444;
      color: white;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      color: #999;
      padding: 40px;
      display: none;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-box {
      background: white;
      padding: 30px;
      border-radius: 14px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .modal-box h3 { margin-bottom: 16px; color: #1a1a2e; }

    .modal-box input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e8e8e8;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }

    .modal-box input:focus { border-color: #667eea; }

    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }

    .btn-save {
      flex: 1; padding: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 8px;
      cursor: pointer; font-weight: 600;
    }

    .btn-cancel {
      flex: 1; padding: 10px;
      background: #eee; color: #333;
      border: none; border-radius: 8px;
      cursor: pointer; font-weight: 600;
    }

    .notification {
      position: fixed;
      bottom: 24px; right: 24px;
      padding: 12px 24px;
      border-radius: 8px;
      color: white; font-weight: 600;
      opacity: 0; transition: opacity 0.3s;
      z-index: 999;
    }

    .notification.show { opacity: 1; }

    #pagination button {
      margin: 4px; padding: 6px 14px;
      border: 2px solid #667eea;
      background: white; color: #667eea;
      border-radius: 6px; cursor: pointer; font-weight: 600;
    }

    #pagination button:disabled { background: #667eea; color: white; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>Student Management System</h1>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>

  <!-- Add Student (admin only) -->
  <div class="card" id="adminControls" style="display:none;">
    <h2>Add Student</h2>
    <div class="form-row">
      <input type="text" id="name" placeholder="Name" />
      <input type="text" id="roll" placeholder="Roll Number" />
      <input type="text" id="course" placeholder="Course" />
      <button class="btn-add" onclick="addStudent()">Add Student</button>
    </div>
  </div>

  <!-- Students List -->
  <div class="card">
    <h2>Students</h2>
    <input type="text" id="search" class="search-bar" placeholder="Search by name or course" />
    <select id="sort" class="sort-select">
      <option value="">Sort by</option>
      <option value="name-asc">Name A-Z</option>
      <option value="name-desc">Name Z-A</option>
      <option value="roll-asc">Roll Ascending</option>
    </select>
    <div id="students"></div>
    <div id="emptyState" class="empty-state">No students found.</div>
    <div id="pagination"></div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-box">
      <h3>Edit Student</h3>
      <input type="text" id="editName" placeholder="Name" />
      <input type="text" id="editRoll" placeholder="Roll Number" />
      <input type="text" id="editCourse" placeholder="Course" />
      <div class="modal-actions">
        <button class="btn-save" onclick="saveEdit()">Save</button>
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal-box" style="text-align:center;">
      <h3>Delete Student?</h3>
      <p style="color:#666; margin: 10px 0 20px;">This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn-delete" id="confirmDeleteBtn">Yes, Delete</button>
        <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Notification -->
  <div class="notification" id="notification"></div>

  <!-- ✅ Script MUST be at the bottom -->
  <script src="dashboard.js"></script>
</body>
</html>
