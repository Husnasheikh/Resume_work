<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Student Management System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', sans-serif;
    }

    .login-box {
      background: white;
      padding: 40px 35px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-box h2 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a2e;
    }

    .login-box p {
      color: #888;
      margin-bottom: 28px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      margin-bottom: 16px;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border 0.3s;
    }

    input:focus {
      border-color: #667eea;
    }

    .btn-admin {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      transition: opacity 0.3s;
    }

    .btn-viewer {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .btn-admin:hover, .btn-viewer:hover {
      opacity: 0.9;
    }

    #errorMsg {
      color: #e04444;
      font-size: 13px;
      margin-top: 12px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Welcome Back</h2>
    <p>Student Management System</p>

    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />

    <button class="btn-admin" id="adminBtn">Login as Admin</button>
    <button class="btn-viewer" id="viewerBtn">Login as Viewer</button>

    <p id="errorMsg"></p>
  </div>

  <script src="login.js"></script>
</body>
</html>
